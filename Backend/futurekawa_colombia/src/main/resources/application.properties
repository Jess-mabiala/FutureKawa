# ─────────────────────────────────────────
# FutureKawa — Backend Colombie
# ─────────────────────────────────────────

server.port=3002

# ─── PostgreSQL ───
spring.datasource.url=jdbc:postgresql://localhost:5432/futurekawa_colombia
spring.datasource.username=postgres
spring.datasource.password=postgres1234
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ───
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── MQTT ───
mqtt.broker.url=tcp://localhost:1883
mqtt.broker.clientId=backend-colombia
mqtt.broker.topic=futurekawa/colombia/#

# ─── Mail (alertes) ───
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=CHANGE_ME
spring.mail.password=CHANGE_ME
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

alert.email.from=noreply@futurekawa.com

# ─── Pays ───
country.code=BR